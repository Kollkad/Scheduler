# .github/workflows/tests.yml
name: Backend Health Check

on: [push]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest pandas openpyxl
        
    - name: Download full test data (optional)
      run: |
        curl -L https://github.com/Kollkad/Scheduler/releases/download/v2.0.0/test_data.zip -o /tmp/test_data.zip
        unzip -o /tmp/test_data.zip -d tests/data/
      continue-on-error: true
        
    - name: Run tests
      run: |
        cd backend
        PYTHONPATH=$GITHUB_WORKSPACE/backend pytest ../tests/ -v -m ci

